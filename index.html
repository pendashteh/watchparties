<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Parties</title>
<meta property="og:title" content="Watch Parties">
<meta property="og:description" content="Enter your Watch Party code to join a live event.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #0d1f3c;
  --navy-mid:   #132847;
  --navy-card:  #162d54;
  --gold:       #c9a227;
  --gold-light: #e8be4a;
  --red-au:     #c0292a;
  --white:      #ffffff;
  --muted:      #8a9ab5;
  --muted-dim:  #536480;
  --border:     rgba(201,162,39,0.22);
  --border-dim: rgba(255,255,255,0.08);
}

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ── Shared ─────────────────────────────────────────────── */

.aus-strip { width: 100%; height: 5px; display: flex; }
.aus-strip span { flex: 1; }
.s1 { background: var(--red-au); }
.s2 { background: var(--gold); }
.s3 { background: var(--white); }
.s4 { background: var(--gold); }
.s5 { background: var(--red-au); }

.page-wrap {
  width: 100%; max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}

.topbar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 1.25rem;
  border-bottom: 0.5px solid var(--border);
  gap: 1rem; flex-wrap: wrap;
}
.org-logo {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; flex-shrink: 0;
}
.org-mark {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--gold); color: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 16px;
  letter-spacing: -1px; flex-shrink: 0;
}
.site-mark { width: 34px; height: 34px; display: block; flex-shrink: 0; }
.org-wordmark { font-weight: 600; font-size: 17px; color: var(--white); letter-spacing: -0.3px; }

.topbar-nav {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--muted); flex-wrap: wrap;
}
.topbar-nav a { color: var(--muted); text-decoration: none; }
.topbar-nav a:hover { color: var(--gold); }
.dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-dim); }

.section-rule { border: none; border-top: 0.5px solid var(--border); }
.section-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.section-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700; white-space: nowrap;
}
.section-head::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

/* ── View toggling ──────────────────────────────────────── */
#view-home, #view-party { display: none; }

/* ═══════════════════════════════════════════════════════════
   HOME VIEW
══════════════════════════════════════════════════════════ */

#view-home .entry-card { margin-top: 1.5rem; }

.entry-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem;
  max-width: 480px;
}
.entry-label {
  font-size: 12px; letter-spacing: 1.2px;
  text-transform: uppercase; font-weight: 600;
  color: var(--muted); margin-bottom: 0.75rem;
}
.input-row { display: flex; margin-bottom: 0.5rem; }
.code-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-right: none;
  border-radius: 10px 0 0 10px;
  padding: 0.8rem 1rem;
  font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
  color: var(--white); outline: none;
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
}
.code-input::placeholder { color: var(--muted-dim); }
.code-input:focus {
  border-color: rgba(201,162,39,0.5);
  background: rgba(255,255,255,0.09);
}
.code-input.error {
  border-color: rgba(192,41,42,0.7) !important;
  animation: shake 0.35s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.join-code-btn {
  background: var(--gold); color: var(--navy);
  border: none; cursor: pointer;
  border-radius: 0 10px 10px 0;
  padding: 0.8rem 1.25rem;
  font-weight: 700; font-size: 0.9rem;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s; white-space: nowrap;
}
.join-code-btn:hover { background: var(--gold-light); }
.join-code-btn:active { transform: scale(0.97); }

.error-msg {
  font-size: 12.5px; color: #f87171;
  min-height: 20px; margin-bottom: 0.35rem;
  opacity: 0; transition: opacity 0.2s;
}
.error-msg.visible { opacity: 1; }

.divider-or {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 1.25rem 0;
  font-size: 12px; color: var(--muted-dim);
}
.divider-or::before, .divider-or::after {
  content: ''; flex: 1; height: 0.5px;
  background: var(--border-dim);
}

.create-btn {
  width: 100%; background: transparent;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px; padding: 0.8rem 1.5rem;
  color: var(--muted-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; font-weight: 500;
  cursor: not-allowed;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.coming-tag {
  font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; font-weight: 600;
  background: rgba(255,255,255,0.06);
  padding: 2px 6px; border-radius: 4px;
  color: var(--muted-dim);
}

/* ═══════════════════════════════════════════════════════════
   PARTY VIEW
══════════════════════════════════════════════════════════ */

/* Sticky mobile join strip */
.mobile-join-strip {
  display: none;
  position: sticky; top: 0; z-index: 100;
  background: var(--gold);
  padding: 0.8rem 1.25rem;
  align-items: center; justify-content: space-between;
  gap: 0.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.mjs-text { font-size: 0.85rem; font-weight: 600; color: var(--navy); line-height: 1.25; }
.mjs-text small { display: block; font-weight: 400; font-size: 0.72rem; opacity: 0.65; }
.mjs-btn {
  background: var(--navy); color: var(--gold);
  text-decoration: none;
  padding: 0.55rem 1.1rem; border-radius: 8px;
  font-weight: 700; font-size: 0.88rem;
  white-space: nowrap; flex-shrink: 0;
}

@media (max-width: 640px) { .mobile-join-strip { display: flex; } }

.party-topbar-right {
  display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
}
.back-btn {
  display: flex; align-items: center; gap: 5px;
  background: transparent;
  border: 0.5px solid var(--border-dim);
  border-radius: 8px; padding: 5px 10px;
  color: var(--muted); font-size: 13px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, color 0.15s;
}
.back-btn:hover { border-color: var(--border); color: var(--white); }
.share-btn {
  display: flex; align-items: center; gap: 5px;
  background: transparent;
  border: 0.5px solid var(--border-dim);
  border-radius: 8px; padding: 5px 10px;
  color: var(--muted); font-size: 13px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, color 0.15s;
}
.share-btn:hover { border-color: var(--gold); color: var(--gold); }

/* Scheduled at */
.scheduled-at { margin: 1.25rem 0 0.5rem; }
.sat-label {
  font-size: 10.5px; letter-spacing: 1.2px; text-transform: uppercase;
  font-weight: 600; color: var(--muted); margin-bottom: 0.6rem;
}
.sat-entries { display: flex; flex-direction: column; gap: 0.4rem; }
.sat-entry {
  display: flex; align-items: center; gap: 0.7rem;
  background: rgba(255,255,255,0.03);
  border: 0.5px solid var(--border-dim);
  border-radius: 10px; padding: 0.65rem 0.9rem;
}
.sat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sat-entry.live    .sat-dot { background: #f87171; animation: pulse 1.6s infinite; }
.sat-entry.replay  .sat-dot { background: #7ab8f0; }
.sat-entry.playback .sat-dot { background: var(--gold); }
.sat-type {
  font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
}
.sat-entry.live     .sat-type { background: rgba(192,41,42,0.15);  color: #f87171; }
.sat-entry.replay   .sat-type { background: rgba(55,138,221,0.12); color: #7ab8f0; }
.sat-entry.playback .sat-type { background: rgba(201,162,39,0.12); color: var(--gold-light); }
.sat-entry.is-over  { opacity: 0.45; }
.sat-entry.is-over  .sat-dot { background: var(--muted-dim) !important; animation: none !important; }
.sat-entry.is-over  .sat-type { background: rgba(255,255,255,0.05); color: var(--muted-dim); }
.sat-entry.is-soon  .sat-dot { background: var(--gold) !important; animation: pulse 1.6s infinite !important; }
.sat-entry.is-soon  .sat-type { background: rgba(201,162,39,0.2); color: var(--gold-light); }
.sat-when { flex: 1; font-size: 0.95rem; font-weight: 600; color: var(--white); }
.cal-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: transparent; border: 0.5px solid var(--border-dim);
  border-radius: 7px; padding: 4px 9px;
  color: var(--muted); font-size: 11.5px; font-weight: 500;
  text-decoration: none; white-space: nowrap;
  transition: border-color 0.15s, color 0.15s;
}
.cal-btn:hover { border-color: var(--gold); color: var(--gold); }
.sat-add-all { margin-top: 0.5rem; text-align: right; font-size: 12px; }
.sat-add-all a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
.sat-add-all a:hover { color: var(--gold); }

/* Share modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-dialog {
  background: var(--navy-card); border: 1px solid var(--border);
  border-radius: 20px; padding: 2rem;
  width: 90%; max-width: 360px; position: relative;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; font-weight: 700; margin-bottom: 1.25rem;
}
.modal-close {
  position: absolute; top: 0.9rem; right: 0.9rem;
  background: transparent; border: none;
  color: var(--muted); font-size: 18px; cursor: pointer;
  width: 30px; height: 30px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.08); color: var(--white); }
.qr-wrap {
  background: #fff; border-radius: 12px;
  padding: 10px; width: fit-content; margin: 0 auto 1.25rem;
  display: flex;
}
.share-url-row { display: flex; gap: 0.5rem; margin-bottom: 0.9rem; }
.share-url-input {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 0.55rem 0.75rem;
  font-size: 11.5px; color: var(--white);
  font-family: 'Courier New', monospace; outline: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.copy-btn {
  background: var(--navy-mid); color: var(--gold);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 0.55rem 0.85rem;
  font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  white-space: nowrap; transition: background 0.15s;
}
.copy-btn:hover { background: rgba(201,162,39,0.1); }
.native-share-btn {
  display: none; width: 100%;
  background: transparent; border: 1px solid var(--border);
  border-radius: 10px; padding: 0.7rem;
  color: var(--white); font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem; font-weight: 500; cursor: pointer;
  transition: border-color 0.15s;
}
.native-share-btn:hover { border-color: var(--gold); }

/* Hero */
.party-hero {
  padding: 1.5rem 0;
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 3rem; align-items: start;
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 0.75rem;
}
.badge {
  background: var(--red-au); color: var(--white);
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1.4px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 4px;
}
.badge-outline {
  background: transparent; border: 1px solid var(--gold); color: var(--gold);
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1.4px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 4px;
}
.party-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 3.5rem; line-height: 1.05;
  margin-bottom: 0.75rem;
}
.party-title .at { color: var(--gold); }
.party-title .brand { color: var(--gold-light); display: block; }
.party-sub {
  font-size: 1rem; color: var(--muted);
  line-height: 1.65; margin-top: 1.25rem; max-width: 500px;
}
.party-sub strong { color: var(--white); font-weight: 500; }

.hero-cta-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.primary-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold); color: var(--navy);
  text-decoration: none;
  padding: 0.85rem 1.75rem; border-radius: 10px;
  font-weight: 700; font-size: 0.95rem;
  transition: background 0.15s, transform 0.1s;
}
.primary-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.secondary-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0.85rem 1.4rem;
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--gold); font-weight: 600; font-size: 0.9rem;
  text-decoration: none; transition: border-color 0.15s;
}
.secondary-link:hover { border-color: var(--gold); }

/* Watch card */
.watch-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 1.75rem;
  position: relative; overflow: hidden;
}
.watch-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.wc-eyebrow {
  font-size: 10.5px; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 600;
  color: var(--gold); margin-bottom: 0.6rem;
}
.wc-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700;
  margin-bottom: 1.25rem; line-height: 1.3;
}
.watch-join-btn {
  display: block; width: 100%;
  background: var(--gold); color: var(--navy);
  text-align: center; text-decoration: none;
  padding: 0.95rem 1.5rem; border-radius: 10px;
  font-weight: 700; font-size: 1rem;
  transition: background 0.15s, transform 0.1s;
  margin-bottom: 0.9rem;
}
.watch-join-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.url-pill {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 0.55rem 0.9rem;
  font-size: 11.5px; color: var(--muted);
  word-break: break-all;
  font-family: 'Courier New', monospace; line-height: 1.45;
}
.wc-note {
  margin-top: 0.7rem; font-size: 12px; color: var(--muted);
  text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ade80; flex-shrink: 0;
  animation: pulse 1.6s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* Options */
.options-section { padding: 1.5rem 0; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.option-card { border: 1px solid var(--border); border-radius: 14px; padding: 1.6rem; }
.option-card.members { background: rgba(201,162,39,0.05); border-color: rgba(201,162,39,0.35); }
.option-card.online  { background: rgba(26,93,178,0.07); border-color: rgba(55,138,221,0.28); }
.option-icon {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 0.9rem;
}
.members .option-icon { background: rgba(201,162,39,0.12); }
.online  .option-icon { background: rgba(55,138,221,0.12); }
.option-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem;
}
.option-card p { font-size: 0.875rem; color: var(--muted); line-height: 1.65; }
.option-card p + p { margin-top: 0.6rem; }
.option-card p strong { color: var(--white); font-weight: 500; }
.option-tag {
  display: inline-block; margin-top: 1rem;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}
.members .option-tag { background: rgba(201,162,39,0.12); color: var(--gold-light); }
.online  .option-tag { background: rgba(74,222,128,0.1); color: #4ade80; }


/* Footer */
.footer {
  border-top: 0.5px solid var(--border);
  padding: 2.25rem 0 1.5rem;
  display: flex; align-items: center;
  justify-content: space-between; gap: 1.5rem; flex-wrap: wrap;
}
.footer-left { font-size: 12.5px; color: var(--muted); line-height: 1.65; }
.footer-left a { color: var(--gold); text-decoration: none; }
.footer-left a:hover { text-decoration: underline; }
.sponsors { display: flex; align-items: center; gap: 1.25rem; }
.sponsor-label { font-size: 10.5px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.sponsor-rule { width: 0.5px; height: 26px; background: var(--border-dim); }
.sponsor-link { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.sponsor-mark {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1.5px solid rgba(55,138,221,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #7ab8f0; letter-spacing: 0.5px;
}
.sponsor-name { font-size: 12.5px; font-weight: 500; color: #7ab8f0; line-height: 1.2; }
.sponsor-name small { display: block; font-size: 10px; font-weight: 400; color: var(--muted); }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 760px) {
  .party-hero { grid-template-columns: 1fr; gap: 2rem; }
  .party-title { font-size: 2.6rem; }
  .options-grid { grid-template-columns: 1fr; }
  .footer { flex-direction: column; align-items: flex-start; gap: 1.25rem; }
  .topbar-nav { display: none; }
}
@media (max-width: 480px) {
  .page-wrap { padding: 0 1rem 3rem; }
  .entry-card { padding: 1.5rem; }
  #view-home .entry-card { margin-top: 1rem; }
}
</style>
</head>
<body>

<div class="aus-strip">
  <span class="s1"></span><span class="s2"></span><span class="s3"></span>
  <span class="s4"></span><span class="s5"></span>
</div>

<!-- ══════════════════════════════════════════════════════
     HOME VIEW
════════════════════════════════════════════════════════ -->
<div id="view-home">
  <div class="page-wrap">
    <nav class="topbar">
      <a href="#" onclick="goHome(event)" class="org-logo">
        <img src="logos/watch-parties.svg" alt="" class="site-mark">
        <span class="org-wordmark">Watch Parties</span>
      </a>
    </nav>

    <div class="entry-card">
      <div class="entry-label">Enter your Watch Party code</div>
      <div class="input-row">
        <input
          type="text"
          class="code-input"
          id="codeInput"
          placeholder="enter your code"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
        >
        <button class="join-code-btn" onclick="handleJoin()">Join &rarr;</button>
      </div>
      <div class="error-msg" id="errorMsg">That code wasn't found. Check the spelling and try again.</div>

      <div class="divider-or">or</div>

      <button class="create-btn" disabled>
        Create a New Watch Party
        <span class="coming-tag">Coming soon</span>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     PARTY VIEW
════════════════════════════════════════════════════════ -->
<div id="view-party">

  <div class="mobile-join-strip">
    <div class="mjs-text"></div>
    <a class="mjs-btn" href="" target="_blank">Join Live &rarr;</a>
  </div>

  <div class="page-wrap">
    <nav class="topbar">
      <a id="party-org-logo" class="org-logo" href=""></a>
      <div class="party-topbar-right">
        <button class="share-btn" onclick="openShare()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 8.5V1M3.5 4L6.5 1l3 3M2 9.5v2a.5.5 0 00.5.5h8a.5.5 0 00.5-.5v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Share
        </button>
        <button class="back-btn" onclick="goHome()">
          &larr; All Watch Parties
        </button>
        <div class="topbar-nav"></div>
      </div>
    </nav>

    <section class="party-hero">
      <div>
        <div class="hero-eyebrow"></div>
        <h1 class="party-title"></h1>
        <div class="hero-cta-row"></div>
        <div id="times-list"></div>
        <p class="party-sub"></p>
      </div>

      <div class="watch-card">
        <div class="wc-eyebrow">&#9654; Live Watch Link</div>
        <div class="wc-title"></div>
        <a class="watch-join-btn" href="" target="_blank"></a>
        <div class="url-pill"></div>
        <div class="wc-note">
          <span class="live-dot"></span>
          <span class="wc-note-text"></span>
        </div>
      </div>
    </section>

    <hr class="section-rule">

    <section class="options-section">
      <div class="section-head"><h2 class="attendance-title"></h2></div>
      <div class="options-grid"></div>
    </section>

    <hr class="section-rule">

    <footer class="footer">
      <div class="footer-left"></div>
      <div id="party-sponsor" class="sponsors"></div>
    </footer>
  </div>
</div>

<div id="share-modal" class="modal-overlay" onclick="closeShareOutside(event)">
  <div class="modal-dialog">
    <button class="modal-close" onclick="closeShare()">&times;</button>
    <div class="modal-title">Share this Watch Party</div>
    <div class="qr-wrap"><canvas id="share-qr"></canvas></div>
    <div class="share-url-row">
      <input type="text" class="share-url-input" id="share-url" readonly>
      <button class="copy-btn" id="copy-btn" onclick="copyShareLink()">Copy</button>
    </div>
    <button class="native-share-btn" id="native-share-btn" onclick="nativeShare()">&#8679; Share via&hellip;</button>
  </div>
</div>

<script>
  var VALID = {};
  var ENTITIES = {};
  var CURRENT_PARTY = null;

  // --- helpers ---

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function entityLogoHtml(e, opts) {
    opts = opts || {};
    if (e.logo) {
      var st = 'height:' + (e.logoHeight || 28) + 'px;max-width:140px;object-fit:contain;display:block;';
      if (e.logoBg) st += 'background:' + e.logoBg + ';padding:' + (e.logoPadding || '3px 8px') + ';border-radius:6px;';
      if (opts.filter) st += 'filter:' + opts.filter + ';';
      return '<img src="' + esc(e.logo) + '" alt="' + esc(e.name) + '" style="' + st + '">';
    }
    var bg = e.markBg ? 'background:' + e.markBg + ';' : '';
    var col = e.markColor ? 'color:' + e.markColor + ';' : '';
    return '<div class="org-mark" style="' + bg + col + '">' + esc(e.mark || '') + '</div>' +
      '<span class="org-wordmark">' + esc(e.name) + '</span>';
  }

  // --- rendering ---

  function renderPartyView(party) {
    var v = party.venue;
    var organizer = ENTITIES[party.organizer] || {};
    var sponsor   = ENTITIES[party.sponsor]   || null;
    document.title = party.pageTitle;

    CURRENT_PARTY = party;

    // Organizer logo (topbar) — links back to this party page, not external
    var logoEl = document.getElementById('party-org-logo');
    logoEl.href = '?wp=' + encodeURIComponent(party.code);
    logoEl.innerHTML = entityLogoHtml(organizer);

    // Derive display URL from the single venue URL
    var parsedUrl;
    try { parsedUrl = new URL(v.url); } catch(e) { parsedUrl = { hostname: v.url, pathname: '' }; }

    // Mobile join strip
    document.querySelector('.mjs-text').innerHTML =
      '&#9654; ' + esc(party.title.join(' ')) + '<small>' + esc(v.mobileSub) + '</small>';
    document.querySelector('.mjs-btn').href = v.url;

    // Topbar nav
    document.querySelector('#view-party .topbar-nav').innerHTML =
      party.topbarLinks.map(function(l, i) {
        return (i > 0 ? '<div class="dot"></div>' : '') +
          '<a href="' + esc(l.url) + '" target="_blank">' + esc(l.label) + '</a>';
      }).join('');

    // Badges
    document.querySelector('.hero-eyebrow').innerHTML =
      party.badges.map(function(b) {
        var cls = b.style === 'outline' ? 'badge-outline' : 'badge';
        return '<span class="' + cls + '">' + esc(b.text) + '</span>';
      }).join('');

    // Title + brand
    document.querySelector('.party-title').innerHTML =
      party.title.join('<br>') +
      '<span class="at"> @ </span><span class="brand">' + esc(party.brand) + '</span>';

    // Times / schedule
    var tl = document.getElementById('times-list');
    if (party.times && party.times.length) {
      tl.className = 'scheduled-at';
      var entries = party.times.map(function(t) {
        var href = makeICS([partyCalEvt(party, t)]);
        var status = timeStatus(t);
        var label = status === 'over' ? 'Over' : status === 'soon' ? 'Soon' : t.type;
        var cls = 'sat-entry ' + esc(t.type) + (status ? ' is-' + status : '');
        return '<div class="' + cls + '">' +
          '<span class="sat-dot"></span>' +
          '<span class="sat-type">' + esc(label) + '</span>' +
          '<span class="sat-when">' + esc(formatTimeLabel(t.start)) + '</span>' +
          '<a class="cal-btn" href="' + href + '" download="watch-party-' + esc(t.type) + '.ics">+ Calendar</a>' +
          '</div>';
      }).join('');
      var addAll = party.times.length > 1
        ? '<div class="sat-add-all"><a href="' + makeICS(party.times.map(function(t){ return partyCalEvt(party,t); })) + '" download="watch-party-all.ics">Add all to calendar &darr;</a></div>'
        : '';
      tl.innerHTML = '<div class="sat-label">Scheduled at</div><div class="sat-entries">' + entries + '</div>' + addAll;
      tl.style.display = '';
    } else {
      tl.style.display = 'none';
    }

    // Subtitle (trusted HTML)
    document.querySelector('.party-sub').innerHTML = party.subtitle;

    // Hero CTA row
    document.querySelector('.hero-cta-row').innerHTML =
      '<a class="primary-btn" href="' + esc(v.url) + '" target="_blank">&#9654; ' + esc(v.primaryCta) + '</a>' +
      party.externalLinks.map(function(l) {
        return '<a class="secondary-link" href="' + esc(l.url) + '" target="_blank">' + esc(l.label) + '</a>';
      }).join('');

    // Venue card
    document.querySelector('.wc-title').textContent = v.label;
    var joinBtn = document.querySelector('.watch-join-btn');
    joinBtn.href = v.url;
    joinBtn.textContent = v.joinCta;
    document.querySelector('.url-pill').innerHTML = esc(parsedUrl.hostname) + '<br>' + esc(parsedUrl.pathname);
    document.querySelector('.wc-note-text').textContent = v.note;

    // Attendance options
    document.querySelector('.attendance-title').textContent = party.sections.attendance;
    document.querySelector('.options-grid').innerHTML = party.attendance.map(function(a) {
      return '<div class="option-card ' + esc(a.variant) + '">' +
        '<div class="option-icon">' + a.icon + '</div>' +
        '<h3>' + esc(a.title) + '</h3>' +
        (a.paragraphs && a.paragraphs[0] ? '<p>' + a.paragraphs[0] + '</p>' : '') +
        '<span class="option-tag">' + esc(a.tag) + '</span>' +
        '</div>';
    }).join('');

    // Footer
    var f = party.footer;
    document.querySelector('#view-party .footer-left').innerHTML =
      'An <strong>' + esc(f.org) + '</strong> community initiative &middot; ' +
      '<a href="' + esc(f.orgUrl) + '" target="_blank">' + esc(f.orgUrl.replace('https://', '')) + '</a>' +
      ' &middot; ' + esc(f.address) + '<br>' +
      f.extraLinks.map(function(l) {
        return '<a href="' + esc(l.url) + '" target="_blank">' + esc(l.label) + '</a>';
      }).join(' &middot; ') +
      ' &middot; Code: <code style="font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:4px;">' +
      esc(party.code) + '</code>';

    // Sponsor (entity logo in footer)
    document.getElementById('party-sponsor').innerHTML = sponsor ?
      '<span class="sponsor-label">' + esc(party.sponsorLabel || 'Sponsored by') + '</span>' +
      '<div class="sponsor-rule"></div>' +
      '<a class="sponsor-link" href="' + esc(sponsor.url) + '" target="_blank">' +
        entityLogoHtml(sponsor, { nameBelow: party.sponsorRole }) +
      '</a>' : '';
  }

  // --- calendar helpers ---

  function toICSDate(iso) {
    return new Date(iso).toISOString().replace(/[-:]/g,'').replace(/\.\d+Z$/,'Z');
  }

  function makeICS(evts) {
    var lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Watch Parties//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
    evts.forEach(function(ev) {
      lines.push(
        'BEGIN:VEVENT',
        'UID:' + ev.uid + '@watch-parties',
        'DTSTART:' + toICSDate(ev.start),
        'DTEND:' + toICSDate(ev.end),
        'SUMMARY:' + ev.summary,
        'URL:' + ev.url,
        'DESCRIPTION:' + ev.url,
        'END:VEVENT'
      );
    });
    lines.push('END:VCALENDAR');
    return 'data:text/calendar;charset=utf-8,' + encodeURIComponent(lines.join('\r\n'));
  }

  function formatTimeLabel(iso) {
    var d = new Date(iso);
    var m = iso.match(/([+-])(\d{2}):(\d{2})$/);
    var offsetMs = 0, tzLabel = 'UTC';
    if (m) {
      var sign = m[1] === '+' ? 1 : -1;
      var h = parseInt(m[2]), min = parseInt(m[3]);
      offsetMs = sign * (h * 60 + min) * 60000;
      var net = sign * h + sign * min / 60;
      tzLabel = net === 10 ? 'AEST' : net === 11 ? 'AEDT' :
                net === 9.5 ? 'ACST' : net === 10.5 ? 'ACDT' :
                net === 8 ? 'AWST' :
                'UTC' + (sign > 0 ? '+' : '') + (sign * h) + (min ? ':' + String(min).padStart(2,'0') : '');
    }
    var w = new Date(d.getTime() + offsetMs);
    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var hrs = w.getUTCHours(), mins = w.getUTCMinutes();
    var ampm = hrs >= 12 ? 'pm' : 'am';
    hrs = hrs % 12 || 12;
    var time = hrs + (mins ? ':' + String(mins).padStart(2, '0') : '') + ampm;
    return days[w.getUTCDay()] + ' ' + w.getUTCDate() + ' ' + months[w.getUTCMonth()] + ' · ' + time + ' ' + tzLabel;
  }

  function timeStatus(t) {
    var now = Date.now();
    var start = new Date(t.start).getTime();
    if (now > start + 3 * 3600000) return 'over';
    if (start - now < 3600000)     return 'soon';
    return null;
  }

  function partyCalEvt(party, t) {
    var typeName = t.type.charAt(0).toUpperCase() + t.type.slice(1);
    return {
      uid: party.code + '-' + t.type,
      start: t.start,
      end: new Date(new Date(t.start).getTime() + 90 * 60000).toISOString(),
      summary: party.title.join(' ') + ' @ ' + party.brand + ' — ' + typeName,
      url: t.url || party.venue.url
    };
  }

  // --- sharing ---

  function openShare() {
    if (!CURRENT_PARTY) return;
    var shareUrl = window.location.origin + window.location.pathname + '?wp=' + encodeURIComponent(CURRENT_PARTY.code);
    document.getElementById('share-url').value = shareUrl;
    var canvas = document.getElementById('share-qr');
    if (typeof QRCode !== 'undefined') {
      QRCode.toCanvas(canvas, shareUrl, { width: 180, margin: 1, color: { dark: '#0d1f3c', light: '#ffffff' } });
    }
    document.getElementById('native-share-btn').style.display = navigator.share ? 'block' : 'none';
    document.getElementById('share-modal').classList.add('open');
    document.getElementById('copy-btn').textContent = 'Copy';
  }

  function closeShare() {
    document.getElementById('share-modal').classList.remove('open');
  }

  function closeShareOutside(e) {
    if (e.target === document.getElementById('share-modal')) closeShare();
  }

  function copyShareLink() {
    var url = document.getElementById('share-url').value;
    var btn = document.getElementById('copy-btn');
    var done = function() { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 2000); };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(done).catch(done);
    } else {
      document.getElementById('share-url').select();
      try { document.execCommand('copy'); } catch(e) {}
      done();
    }
  }

  function nativeShare() {
    if (!CURRENT_PARTY || !navigator.share) return;
    var shareUrl = window.location.origin + window.location.pathname + '?wp=' + encodeURIComponent(CURRENT_PARTY.code);
    navigator.share({ title: CURRENT_PARTY.pageTitle, url: shareUrl }).catch(function() {});
  }

  // --- routing ---

  function showView(v) {
    document.getElementById('view-home').style.display  = v === 'home'  ? 'block' : 'none';
    document.getElementById('view-party').style.display = v === 'party' ? 'block' : 'none';
    if (v === 'home') document.title = 'Watch Parties';
    window.scrollTo(0, 0);
  }

  function goHome(e) {
    if (e && e.preventDefault) e.preventDefault();
    history.pushState({ view: 'home' }, '', window.location.pathname);
    showView('home');
    document.getElementById('codeInput').value = '';
    clearError();
  }

  function goParty(code, push) {
    var party = VALID[code];
    if (!party) return;
    renderPartyView(party);
    if (push) history.pushState({ view: 'party', code: code }, '', '?wp=' + encodeURIComponent(code));
    showView('party');
  }

  function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('codeInput').classList.remove('error');
  }

  function handleJoin() {
    var raw = document.getElementById('codeInput').value.trim().toLowerCase();
    clearError();
    if (!raw) return;
    if (VALID[raw]) {
      goParty(raw, true);
    } else {
      var inp = document.getElementById('codeInput');
      inp.classList.add('error');
      document.getElementById('errorMsg').classList.add('visible');
      setTimeout(function() { inp.classList.remove('error'); }, 400);
    }
  }

  function init(site, parties) {
    ENTITIES = site.entities || {};
    parties.parties.forEach(function(p) { VALID[p.code] = p; });

    document.getElementById('codeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleJoin();
      else clearError();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeShare();
    });

    window.addEventListener('popstate', function(e) {
      var code = e.state && e.state.code;
      if (code && VALID[code]) { renderPartyView(VALID[code]); showView('party'); }
      else showView('home');
    });

    var wp = new URLSearchParams(window.location.search).get('wp') || '';
    if (VALID[wp]) goParty(wp, false);
    else showView('home');
  }

  Promise.all([
    fetch('site.json').then(function(r) { return r.json(); }),
    fetch('parties.json').then(function(r) { return r.json(); })
  ]).then(function(res) {
    init(res[0], res[1]);
  }).catch(function() { showView('home'); });
</script>
</body>
</html>
