<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Parties</title>
<meta property="og:title" content="Watch Parties">
<meta property="og:description" content="Enter your Watch Party code to join a live event.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #0d1f3c;
  --navy-mid:   #132847;
  --navy-card:  #162d54;
  --gold:       #c9a227;
  --gold-light: #e8be4a;
  --red-au:     #c0292a;
  --white:      #ffffff;
  --muted:      #8a9ab5;
  --muted-dim:  #536480;
  --border:     rgba(201,162,39,0.22);
  --border-dim: rgba(255,255,255,0.08);
}

html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ── Shared ─────────────────────────────────────────────── */

.aus-strip { width: 100%; height: 5px; display: flex; }
.aus-strip span { flex: 1; }
.s1 { background: var(--red-au); }
.s2 { background: var(--gold); }
.s3 { background: var(--white); }
.s4 { background: var(--gold); }
.s5 { background: var(--red-au); }

.page-wrap {
  width: 100%; max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}

.topbar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 1.25rem;
  border-bottom: 0.5px solid var(--border);
  gap: 1rem; flex-wrap: wrap;
}
.org-logo {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; flex-shrink: 0;
}
.org-mark {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--gold); color: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 16px;
  letter-spacing: -1px; flex-shrink: 0;
}
.org-wordmark { font-weight: 600; font-size: 17px; color: var(--white); letter-spacing: -0.3px; }

.topbar-nav {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--muted); flex-wrap: wrap;
}
.topbar-nav a { color: var(--muted); text-decoration: none; }
.topbar-nav a:hover { color: var(--gold); }
.dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted-dim); }

.section-rule { border: none; border-top: 0.5px solid var(--border); }
.section-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
.section-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700; white-space: nowrap;
}
.section-head::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

/* ── View toggling ──────────────────────────────────────── */
#view-home, #view-party { display: none; }

/* ═══════════════════════════════════════════════════════════
   HOME VIEW
══════════════════════════════════════════════════════════ */

#view-home .entry-card { margin-top: 1.5rem; }

.entry-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem;
  max-width: 480px;
}
.entry-label {
  font-size: 12px; letter-spacing: 1.2px;
  text-transform: uppercase; font-weight: 600;
  color: var(--muted); margin-bottom: 0.75rem;
}
.input-row { display: flex; margin-bottom: 0.5rem; }
.code-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-right: none;
  border-radius: 10px 0 0 10px;
  padding: 0.8rem 1rem;
  font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
  color: var(--white); outline: none;
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
}
.code-input::placeholder { color: var(--muted-dim); }
.code-input:focus {
  border-color: rgba(201,162,39,0.5);
  background: rgba(255,255,255,0.09);
}
.code-input.error {
  border-color: rgba(192,41,42,0.7) !important;
  animation: shake 0.35s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.join-code-btn {
  background: var(--gold); color: var(--navy);
  border: none; cursor: pointer;
  border-radius: 0 10px 10px 0;
  padding: 0.8rem 1.25rem;
  font-weight: 700; font-size: 0.9rem;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s; white-space: nowrap;
}
.join-code-btn:hover { background: var(--gold-light); }
.join-code-btn:active { transform: scale(0.97); }

.error-msg {
  font-size: 12.5px; color: #f87171;
  min-height: 20px; margin-bottom: 0.35rem;
  opacity: 0; transition: opacity 0.2s;
}
.error-msg.visible { opacity: 1; }

.divider-or {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 1.25rem 0;
  font-size: 12px; color: var(--muted-dim);
}
.divider-or::before, .divider-or::after {
  content: ''; flex: 1; height: 0.5px;
  background: var(--border-dim);
}

.create-btn {
  width: 100%; background: transparent;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px; padding: 0.8rem 1.5rem;
  color: var(--muted-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; font-weight: 500;
  cursor: not-allowed;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.coming-tag {
  font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; font-weight: 600;
  background: rgba(255,255,255,0.06);
  padding: 2px 6px; border-radius: 4px;
  color: var(--muted-dim);
}

/* ═══════════════════════════════════════════════════════════
   PARTY VIEW
══════════════════════════════════════════════════════════ */

/* Sticky mobile join strip */
.mobile-join-strip {
  display: none;
  position: sticky; top: 0; z-index: 100;
  background: var(--gold);
  padding: 0.8rem 1.25rem;
  align-items: center; justify-content: space-between;
  gap: 0.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.mjs-text { font-size: 0.85rem; font-weight: 600; color: var(--navy); line-height: 1.25; }
.mjs-text small { display: block; font-weight: 400; font-size: 0.72rem; opacity: 0.65; }
.mjs-btn {
  background: var(--navy); color: var(--gold);
  text-decoration: none;
  padding: 0.55rem 1.1rem; border-radius: 8px;
  font-weight: 700; font-size: 0.88rem;
  white-space: nowrap; flex-shrink: 0;
}

@media (max-width: 640px) { .mobile-join-strip { display: flex; } }

.party-topbar-right {
  display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
}
.back-btn {
  display: flex; align-items: center; gap: 5px;
  background: transparent;
  border: 0.5px solid var(--border-dim);
  border-radius: 8px; padding: 5px 10px;
  color: var(--muted); font-size: 13px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, color 0.15s;
}
.back-btn:hover { border-color: var(--border); color: var(--white); }

/* Hero */
.party-hero {
  padding: 1.5rem 0;
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 3rem; align-items: start;
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-bottom: 0.75rem;
}
.badge {
  background: var(--red-au); color: var(--white);
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1.4px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 4px;
}
.badge-outline {
  background: transparent; border: 1px solid var(--gold); color: var(--gold);
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1.4px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 4px;
}
.party-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900; font-size: 3.5rem; line-height: 1.05;
  margin-bottom: 0.75rem;
}
.party-title .at { color: var(--gold); }
.party-title .brand { color: var(--gold-light); display: block; }
.party-sub {
  font-size: 1rem; color: var(--muted);
  line-height: 1.65; margin-top: 1.25rem; max-width: 500px;
}
.party-sub strong { color: var(--white); font-weight: 500; }

.hero-cta-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.primary-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold); color: var(--navy);
  text-decoration: none;
  padding: 0.85rem 1.75rem; border-radius: 10px;
  font-weight: 700; font-size: 0.95rem;
  transition: background 0.15s, transform 0.1s;
}
.primary-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.secondary-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0.85rem 1.4rem;
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--gold); font-weight: 600; font-size: 0.9rem;
  text-decoration: none; transition: border-color 0.15s;
}
.secondary-link:hover { border-color: var(--gold); }

/* Watch card */
.watch-card {
  background: var(--navy-card);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 1.75rem;
  position: relative; overflow: hidden;
}
.watch-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.wc-eyebrow {
  font-size: 10.5px; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 600;
  color: var(--gold); margin-bottom: 0.6rem;
}
.wc-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 700;
  margin-bottom: 1.25rem; line-height: 1.3;
}
.watch-join-btn {
  display: block; width: 100%;
  background: var(--gold); color: var(--navy);
  text-align: center; text-decoration: none;
  padding: 0.95rem 1.5rem; border-radius: 10px;
  font-weight: 700; font-size: 1rem;
  transition: background 0.15s, transform 0.1s;
  margin-bottom: 0.9rem;
}
.watch-join-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.url-pill {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 0.55rem 0.9rem;
  font-size: 11.5px; color: var(--muted);
  word-break: break-all;
  font-family: 'Courier New', monospace; line-height: 1.45;
}
.wc-note {
  margin-top: 0.7rem; font-size: 12px; color: var(--muted);
  text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ade80; flex-shrink: 0;
  animation: pulse 1.6s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* Options */
.options-section { padding: 1.5rem 0; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.option-card { border: 1px solid var(--border); border-radius: 14px; padding: 1.6rem; }
.option-card.members { background: rgba(201,162,39,0.05); border-color: rgba(201,162,39,0.35); }
.option-card.online  { background: rgba(26,93,178,0.07); border-color: rgba(55,138,221,0.28); }
.option-icon {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 0.9rem;
}
.members .option-icon { background: rgba(201,162,39,0.12); }
.online  .option-icon { background: rgba(55,138,221,0.12); }
.option-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem;
}
.option-card p { font-size: 0.875rem; color: var(--muted); line-height: 1.65; }
.option-card p + p { margin-top: 0.6rem; }
.option-card p strong { color: var(--white); font-weight: 500; }
.option-tag {
  display: inline-block; margin-top: 1rem;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}
.members .option-tag { background: rgba(201,162,39,0.12); color: var(--gold-light); }
.online  .option-tag { background: rgba(74,222,128,0.1); color: #4ade80; }

/* About section */
.evenue-section { padding: 1.5rem 0; }
.evenue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
.evenue-text p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; margin-bottom: 0.75rem; }
.evenue-text p:last-child { margin-bottom: 0; }
.evenue-text strong { color: var(--white); font-weight: 500; }
.feature-list { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
.feature-list li {
  display: flex; align-items: flex-start; gap: 0.7rem;
  font-size: 0.875rem; color: var(--muted); line-height: 1.5;
}
.feature-list li strong { color: var(--white); font-weight: 500; }
.check {
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(74,222,128,0.1);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.check svg { width: 9px; height: 9px; }

/* Footer */
.footer {
  border-top: 0.5px solid var(--border);
  padding: 2.25rem 0 1.5rem;
  display: flex; align-items: center;
  justify-content: space-between; gap: 1.5rem; flex-wrap: wrap;
}
.footer-left { font-size: 12.5px; color: var(--muted); line-height: 1.65; }
.footer-left a { color: var(--gold); text-decoration: none; }
.footer-left a:hover { text-decoration: underline; }
.sponsors { display: flex; align-items: center; gap: 1.25rem; }
.sponsor-label { font-size: 10.5px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.sponsor-rule { width: 0.5px; height: 26px; background: var(--border-dim); }
.sponsor-link { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.sponsor-mark {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1.5px solid rgba(55,138,221,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #7ab8f0; letter-spacing: 0.5px;
}
.sponsor-name { font-size: 12.5px; font-weight: 500; color: #7ab8f0; line-height: 1.2; }
.sponsor-name small { display: block; font-size: 10px; font-weight: 400; color: var(--muted); }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 760px) {
  .party-hero { grid-template-columns: 1fr; gap: 2rem; }
  .party-title { font-size: 2.6rem; }
  .options-grid { grid-template-columns: 1fr; }
  .evenue-grid { grid-template-columns: 1fr; }
  .footer { flex-direction: column; align-items: flex-start; gap: 1.25rem; }
  .topbar-nav { display: none; }
}
@media (max-width: 480px) {
  .page-wrap { padding: 0 1rem 3rem; }
  .entry-card { padding: 1.5rem; }
  #view-home .entry-card { margin-top: 1rem; }
}
</style>
</head>
<body>

<div class="aus-strip">
  <span class="s1"></span><span class="s2"></span><span class="s3"></span>
  <span class="s4"></span><span class="s5"></span>
</div>

<!-- ══════════════════════════════════════════════════════
     HOME VIEW
════════════════════════════════════════════════════════ -->
<div id="view-home">
  <div class="page-wrap">
    <nav class="topbar">
      <a href="#" onclick="goHome(event)" class="org-logo">
        <div class="org-mark">WP</div>
        <span class="org-wordmark">Watch Parties</span>
      </a>
    </nav>

    <div class="entry-card">
      <div class="entry-label">Enter your Watch Party code</div>
      <div class="input-row">
        <input
          type="text"
          class="code-input"
          id="codeInput"
          placeholder="enter your code"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
        >
        <button class="join-code-btn" onclick="handleJoin()">Join &rarr;</button>
      </div>
      <div class="error-msg" id="errorMsg">That code wasn't found. Check the spelling and try again.</div>

      <div class="divider-or">or</div>

      <button class="create-btn" disabled>
        Create a New Watch Party
        <span class="coming-tag">Coming soon</span>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     PARTY VIEW
════════════════════════════════════════════════════════ -->
<div id="view-party">

  <div class="mobile-join-strip">
    <div class="mjs-text"></div>
    <a class="mjs-btn" href="" target="_blank">Join Live &rarr;</a>
  </div>

  <div class="page-wrap">
    <nav class="topbar">
      <a id="party-org-logo" class="org-logo" href="" target="_blank"></a>
      <div class="party-topbar-right">
        <button class="back-btn" onclick="goHome()">
          &larr; All Watch Parties
        </button>
        <div class="topbar-nav"></div>
      </div>
    </nav>

    <section class="party-hero">
      <div>
        <div class="hero-eyebrow"></div>
        <h1 class="party-title"></h1>
        <div class="hero-cta-row"></div>
        <p class="party-sub"></p>
      </div>

      <div class="watch-card">
        <div class="wc-eyebrow">&#9654; Live Watch Link</div>
        <div class="wc-title"></div>
        <a class="watch-join-btn" href="" target="_blank"></a>
        <div class="url-pill"></div>
        <div class="wc-note">
          <span class="live-dot"></span>
          <span class="wc-note-text"></span>
        </div>
      </div>
    </section>

    <hr class="section-rule">

    <section class="options-section">
      <div class="section-head"><h2 class="attendance-title"></h2></div>
      <div class="options-grid"></div>
    </section>

    <hr class="section-rule">

    <section class="evenue-section">
      <div class="section-head"><h2 class="about-title"></h2></div>
      <div class="evenue-grid">
        <div class="evenue-text"></div>
        <ul class="feature-list"></ul>
      </div>
    </section>

    <hr class="section-rule">

    <footer class="footer">
      <div class="footer-left"></div>
      <div id="party-sponsor" class="sponsors"></div>
    </footer>
  </div>
</div>

<script>
  var VALID = {};
  var ENTITIES = {};

  // --- helpers ---

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function entityLogoHtml(e, opts) {
    opts = opts || {};
    if (e.logo) {
      var st = 'height:' + (e.logoHeight || 28) + 'px;max-width:140px;object-fit:contain;display:block;';
      if (e.logoBg) st += 'background:' + e.logoBg + ';padding:' + (e.logoPadding || '3px 8px') + ';border-radius:6px;';
      if (opts.filter) st += 'filter:' + opts.filter + ';';
      return '<img src="' + esc(e.logo) + '" alt="' + esc(e.name) + '" style="' + st + '">';
    }
    var bg = e.markBg ? 'background:' + e.markBg + ';' : '';
    var col = e.markColor ? 'color:' + e.markColor + ';' : '';
    return '<div class="org-mark" style="' + bg + col + '">' + esc(e.mark || '') + '</div>' +
      '<span class="org-wordmark">' + esc(e.name) + '</span>';
  }

  // --- rendering ---

  function renderPartyView(party) {
    var s = party.stream;
    var organizer = ENTITIES[party.organizer] || {};
    var sponsor   = ENTITIES[party.sponsor]   || null;
    document.title = party.pageTitle;

    // Organizer logo (topbar)
    var logoEl = document.getElementById('party-org-logo');
    logoEl.href = organizer.url || '#';
    logoEl.innerHTML = entityLogoHtml(organizer);

    // Mobile join strip
    document.querySelector('.mjs-text').innerHTML =
      '&#9654; ' + esc(party.title.join(' ')) + '<small>' + esc(s.mobileSub) + '</small>';
    document.querySelector('.mjs-btn').href = s.url;

    // Topbar nav
    document.querySelector('#view-party .topbar-nav').innerHTML =
      party.topbarLinks.map(function(l, i) {
        return (i > 0 ? '<div class="dot"></div>' : '') +
          '<a href="' + esc(l.url) + '" target="_blank">' + esc(l.label) + '</a>';
      }).join('');

    // Badges
    document.querySelector('.hero-eyebrow').innerHTML =
      party.badges.map(function(b) {
        var cls = b.style === 'outline' ? 'badge-outline' : 'badge';
        return '<span class="' + cls + '">' + esc(b.text) + '</span>';
      }).join('');

    // Title + brand
    document.querySelector('.party-title').innerHTML =
      party.title.join('<br>') +
      '<span class="at"> @ </span><span class="brand">' + esc(party.brand) + '</span>';

    // Subtitle (trusted HTML)
    document.querySelector('.party-sub').innerHTML = party.subtitle;

    // Hero CTA row
    document.querySelector('.hero-cta-row').innerHTML =
      '<a class="primary-btn" href="' + esc(s.url) + '" target="_blank">&#9654; ' + esc(s.primaryCta) + '</a>' +
      party.externalLinks.map(function(l) {
        return '<a class="secondary-link" href="' + esc(l.url) + '" target="_blank">' + esc(l.label) + '</a>';
      }).join('');

    // Watch card
    document.querySelector('.wc-title').textContent = s.label;
    var joinBtn = document.querySelector('.watch-join-btn');
    joinBtn.href = s.url;
    joinBtn.textContent = s.joinCta;
    document.querySelector('.url-pill').innerHTML = esc(s.displayUrl[0]) + '<br>' + esc(s.displayUrl[1]);
    document.querySelector('.wc-note-text').textContent = s.note;

    // Attendance options (paragraphs are trusted HTML)
    document.querySelector('.attendance-title').textContent = party.sections.attendance;
    document.querySelector('.options-grid').innerHTML = party.attendance.map(function(a) {
      return '<div class="option-card ' + esc(a.variant) + '">' +
        '<div class="option-icon">' + a.icon + '</div>' +
        '<h3>' + esc(a.title) + '</h3>' +
        a.paragraphs.map(function(p) { return '<p>' + p + '</p>'; }).join('') +
        '<span class="option-tag">' + esc(a.tag) + '</span>' +
        '</div>';
    }).join('');

    // About section (trusted HTML)
    var ab = party.about;
    document.querySelector('.about-title').textContent = ab.title;
    document.querySelector('.evenue-text').innerHTML = ab.paragraphs.map(function(p) {
      return '<p>' + p + '</p>';
    }).join('');
    document.querySelector('.feature-list').innerHTML = ab.features.map(function(f) {
      return '<li>' +
        '<span class="check"><svg viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2 2 4-4" stroke="#4ade80" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
        '<span>' + f.text + '</span>' +
        '</li>';
    }).join('');

    // Footer
    var f = party.footer;
    document.querySelector('#view-party .footer-left').innerHTML =
      'An <strong>' + esc(f.org) + '</strong> community initiative &middot; ' +
      '<a href="' + esc(f.orgUrl) + '" target="_blank">' + esc(f.orgUrl.replace('https://', '')) + '</a>' +
      ' &middot; ' + esc(f.address) + '<br>' +
      f.extraLinks.map(function(l) {
        return '<a href="' + esc(l.url) + '" target="_blank">' + esc(l.label) + '</a>';
      }).join(' &middot; ') +
      ' &middot; Code: <code style="font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);padding:1px 5px;border-radius:4px;">' +
      esc(party.code) + '</code>';

    // Sponsor (entity logo in footer)
    document.getElementById('party-sponsor').innerHTML = sponsor ?
      '<span class="sponsor-label">' + esc(party.sponsorLabel || 'Sponsored by') + '</span>' +
      '<div class="sponsor-rule"></div>' +
      '<a class="sponsor-link" href="' + esc(sponsor.url) + '" target="_blank">' +
        entityLogoHtml(sponsor, { nameBelow: party.sponsorRole }) +
      '</a>' : '';
  }

  // --- routing ---

  function showView(v) {
    document.getElementById('view-home').style.display  = v === 'home'  ? 'block' : 'none';
    document.getElementById('view-party').style.display = v === 'party' ? 'block' : 'none';
    if (v === 'home') document.title = 'Watch Parties';
    window.scrollTo(0, 0);
  }

  function goHome(e) {
    if (e && e.preventDefault) e.preventDefault();
    history.pushState({ view: 'home' }, '', window.location.pathname);
    showView('home');
    document.getElementById('codeInput').value = '';
    clearError();
  }

  function goParty(code, push) {
    var party = VALID[code];
    if (!party) return;
    renderPartyView(party);
    if (push) history.pushState({ view: 'party', code: code }, '', '?wp=' + encodeURIComponent(code));
    showView('party');
  }

  function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('codeInput').classList.remove('error');
  }

  function handleJoin() {
    var raw = document.getElementById('codeInput').value.trim().toLowerCase();
    clearError();
    if (!raw) return;
    if (VALID[raw]) {
      goParty(raw, true);
    } else {
      var inp = document.getElementById('codeInput');
      inp.classList.add('error');
      document.getElementById('errorMsg').classList.add('visible');
      setTimeout(function() { inp.classList.remove('error'); }, 400);
    }
  }

  function init(site, parties) {
    ENTITIES = site.entities || {};
    parties.parties.forEach(function(p) { VALID[p.code] = p; });

    document.getElementById('codeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleJoin();
      else clearError();
    });

    window.addEventListener('popstate', function(e) {
      var code = e.state && e.state.code;
      if (code && VALID[code]) { renderPartyView(VALID[code]); showView('party'); }
      else showView('home');
    });

    var wp = new URLSearchParams(window.location.search).get('wp') || '';
    if (VALID[wp]) goParty(wp, false);
    else showView('home');
  }

  Promise.all([
    fetch('site.json').then(function(r) { return r.json(); }),
    fetch('parties.json').then(function(r) { return r.json(); })
  ]).then(function(res) {
    init(res[0], res[1]);
  }).catch(function() { showView('home'); });
</script>
</body>
</html>
